<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gemini Amharic Voice Test</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      padding: 40px;
      background: #f3f3f3;
    }
    h1 {
      margin-bottom: 16px;
    }
    textarea {
      width: min(800px, 90vw);
      height: 180px;
      padding: 12px;
      font-size: 18px;
    }
    button {
      margin-top: 16px;
      padding: 12px 24px;
      font-size: 18px;
      cursor: pointer;
    }
    select {
      padding: 8px;
      font-size: 16px;
      margin-left: 8px;
    }
    #status {
      margin-top: 16px;
      font-size: 18px;
    }
    audio {
      margin-top: 20px;
      width: min(700px, 90vw);
    }
    .row {
      margin-top: 14px;
    }
  </style>
</head>
<body>
  <h1>Gemini Amharic Voice Test</h1>

  <p>Paste Amharic text and play the real Gemini TTS voice.</p>

  <textarea id="textInput">ሰላም! እንግሊዝኛ መማር በጣም ደስ ይላል። ዛሬ “How are you?” የሚለውን እንማራለን።</textarea>

  <div class="row">
    Voice:
    <select id="voiceSelect">
      <option value="Kore">Kore</option>
      <option value="Puck">Puck</option>
      <option value="Zephyr">Zephyr</option>
      <option value="Aoede">Aoede</option>
      <option value="Schedar">Schedar</option>
    </select>
  </div>

  <div class="row">
    <button id="playBtn">Generate Gemini Voice</button>
  </div>

  <div id="status"></div>
  <audio id="player" controls></audio>

  <script>
    // TEST ONLY. Rotate/delete this key after testing.
    const API_KEY = "AIzaSyBFxmlDfrlR_YI8gQE6uU-O3b2GlP_8wiY";

    const textInput = document.getElementById("textInput");
    const voiceSelect = document.getElementById("voiceSelect");
    const playBtn = document.getElementById("playBtn");
    const statusEl = document.getElementById("status");
    const player = document.getElementById("player");

    playBtn.addEventListener("click", generateVoice);

    async function generateVoice() {
      const text = textInput.value.trim();
      const voice = voiceSelect.value;

      if (!text) {
        statusEl.textContent = "Please enter some text.";
        return;
      }

      statusEl.textContent = "Generating Gemini audio...";
      player.removeAttribute("src");
      player.load();

      try {
        const response = await fetch("https://generativelanguage.googleapis.com/v1beta/interactions", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "x-goog-api-key": API_KEY
          },
          body: JSON.stringify({
            model: "gemini-2.5-flash-preview-tts",
            input: text,
            response_modalities: ["AUDIO"],
            generation_config: {
              speech_config: {
                language: "am-ET",
                voice: voice
              }
            }
          })
        });

        const data = await response.json();
        console.log("Gemini TTS response:", data);

        if (!response.ok) {
          statusEl.textContent = "API Error: " + (data.error?.message || "Unknown error");
          return;
        }

        const audioOutput = data.outputs?.find(o => o.type === "audio");
        if (!audioOutput?.data) {
          statusEl.textContent = "No audio returned.";
          return;
        }

        // TTS response audio is PCM. Wrap it into a WAV container for browser playback.
        const pcmBytes = base64ToUint8Array(audioOutput.data);
        const wavBytes = pcmToWav(pcmBytes, 24000, 1, 16);
        const blob = new Blob([wavBytes], { type: "audio/wav" });
        const url = URL.createObjectURL(blob);

        player.src = url;
        player.play().catch(() => {});
        statusEl.textContent = "Done. Playing Gemini voice.";
      } catch (err) {
        console.error(err);
        statusEl.textContent = "Request failed: " + err.message;
      }
    }

    function base64ToUint8Array(base64) {
      const binary = atob(base64);
      const bytes = new Uint8Array(binary.length);
      for (let i = 0; i < binary.length; i++) {
        bytes[i] = binary.charCodeAt(i);
      }
      return bytes;
    }

    function pcmToWav(pcmData, sampleRate = 24000, channels = 1, bitsPerSample = 16) {
      const blockAlign = channels * bitsPerSample / 8;
      const byteRate = sampleRate * blockAlign;
      const dataSize = pcmData.length;
      const buffer = new ArrayBuffer(44 + dataSize);
      const view = new DataView(buffer);

      writeString(view, 0, "RIFF");
      view.setUint32(4, 36 + dataSize, true);
      writeString(view, 8, "WAVE");
      writeString(view, 12, "fmt ");
      view.setUint32(16, 16, true); // PCM chunk size
      view.setUint16(20, 1, true);  // audio format PCM
      view.setUint16(22, channels, true);
      view.setUint32(24, sampleRate, true);
      view.setUint32(28, byteRate, true);
      view.setUint16(32, blockAlign, true);
      view.setUint16(34, bitsPerSample, true);
      writeString(view, 36, "data");
      view.setUint32(40, dataSize, true);

      new Uint8Array(buffer, 44).set(pcmData);
      return new Uint8Array(buffer);
    }

    function writeString(view, offset, str) {
      for (let i = 0; i < str.length; i++) {
        view.setUint8(offset + i, str.charCodeAt(i));
      }
    }
  </script>
</body>
</html>
