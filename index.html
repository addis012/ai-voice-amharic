<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Amharic English Tutor Test</title>
</head>

<body style="font-family:Arial; text-align:center; padding:40px">

<h2>Amharic → English Tutor</h2>

<button onclick="startListening()">🎤 Speak</button>

<p id="user"></p>
<p id="ai"></p>

<script>

const API_KEY = "PUT_YOUR_API_KEY_HERE";

const systemPrompt = `
You are an English tutor for Amharic speakers.

Rules:
Explain English in simple Amharic.
Encourage the student.
Correct mistakes politely.
Ask short practice questions.
`;

function startListening(){

const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();

recognition.lang = "am-ET";

recognition.onresult = async function(event){

let speech = event.results[0][0].transcript;

document.getElementById("user").innerText = "You: " + speech;

const response = await fetch(
"https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash:generateContent?key=" + API_KEY,
{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body: JSON.stringify({
contents:[
{
parts:[
{text: systemPrompt + "\nStudent: " + speech}
]
}
]
})
});

const data = await response.json();

let reply = data.candidates[0].content.parts[0].text;

document.getElementById("ai").innerText = "Tutor: " + reply;

speak(reply);

};

recognition.start();
}

function speak(text){

const utter = new SpeechSynthesisUtterance(text);

utter.lang = "en-US";

speechSynthesis.speak(utter);

}

</script>

</body>
</html>
