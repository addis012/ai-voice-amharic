<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Amharic → English Tutor</title>
</head>
<body style="font-family: Arial; text-align:center; padding:40px;">

  <h1>Amharic → English Tutor</h1>
  <button onclick="startListening()">🎤 Speak</button>

  <p id="user"></p>
  <p id="ai"></p>
  <p id="error" style="color:red;"></p>

  <script>
    const API_KEY = AIzaSyBFxmlDfrlR_YI8gQE6uU-O3b2GlP_8wiY;

    const systemPrompt = `
You are an English tutor for Amharic speakers.

Rules:
- Explain English in simple Amharic.
- Encourage the student.
- Correct mistakes politely.
- Ask short practice questions.
- Keep the response short and clear.
`;

    function startListening() {
      document.getElementById("error").innerText = "";

      const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

      if (!SpeechRecognition) {
        document.getElementById("error").innerText = "Speech recognition is not supported in this browser.";
        return;
      }

      const recognition = new SpeechRecognition();
      recognition.lang = "am-ET";
      recognition.interimResults = false;
      recognition.maxAlternatives = 1;

      recognition.onresult = async function(event) {
        const speech = event.results[0][0].transcript;
        document.getElementById("user").innerText = "You: " + speech;

        try {
          const response = await fetch(
            `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`,
            {
              method: "POST",
              headers: {
                "Content-Type": "application/json"
              },
              body: JSON.stringify({
                contents: [
                  {
                    parts: [
                      {
                        text: `${systemPrompt}\n\nStudent said: ${speech}`
                      }
                    ]
                  }
                ]
              })
            }
          );

          const data = await response.json();
          console.log("Gemini response:", data);

          if (!response.ok) {
            document.getElementById("error").innerText =
              "API Error: " + (data.error?.message || "Unknown error");
            return;
          }

          const reply =
            data.candidates?.[0]?.content?.parts?.[0]?.text ||
            "No reply returned.";

          document.getElementById("ai").innerText = "Tutor: " + reply;
          speak(reply);

        } catch (err) {
          console.error(err);
          document.getElementById("error").innerText =
            "Request failed: " + err.message;
        }
      };

      recognition.onerror = function(event) {
        document.getElementById("error").innerText =
          "Speech error: " + event.error;
      };

      recognition.start();
    }

    function speak(text) {
      const utter = new SpeechSynthesisUtterance(text);
      utter.lang = "en-US";
      speechSynthesis.speak(utter);
    }
  </script>
</body>
</html>
